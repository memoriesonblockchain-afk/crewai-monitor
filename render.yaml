# Render.com Blueprint Specification
# https://render.com/docs/blueprint-spec

services:
  # FastAPI Backend API
  - type: web
    name: crewai-monitor-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crewai-monitor-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ENVIRONMENT
        value: "production"
      - key: CORS_ORIGINS_STR
        value: "https://crewai-monitor-dashboard.onrender.com,http://localhost:3000"

  # Next.js Dashboard
  - type: web
    name: crewai-monitor-dashboard
    runtime: node
    region: oregon
    plan: free
    rootDir: dashboard
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "https://crewai-monitor-api.onrender.com"
      - key: NODE_ENV
        value: "production"

databases:
  - name: crewai-monitor-db
    region: oregon
    plan: free
    databaseName: crewai_monitor
    user: crewai
